developer_instructions = '''
Follow the root AGENTS.md and .codex/AGENTS.md.
Design structured public data for parameter descriptions, danger signs, log symptoms, and educational workflow guides.
Prefer typed JSON/TS schemas.
Do not inspect, transform, or publish private BIN, XDF, DAMOS, A2L, OLS, tune, customer, or patch-package data.
Do not invent tuning facts or proprietary definitions. Mark unknowns and confidence clearly.
Do not modify Tune App code, manifests, lockfiles, or patch packages unless the user explicitly requests that exact allowed work.
